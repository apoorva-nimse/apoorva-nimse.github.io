<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent — Apoorva Nimse</title>
<meta name="description" content="Thanks for reaching out to Apoorva Nimse.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,400..900&family=Libre+Franklin:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #141412;
    --paper: #FFFFFF;
    --tint: #F5F4F0;
    --turmeric: #C97B10;
    --turmeric-deep: #9A5D08;
    --gray: #6B6B66;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Libre Franklin', -apple-system, sans-serif;
    color: var(--ink);
    background: var(--tint);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    line-height: 1.6;
    font-size: 17px;
  }
  a { color: var(--turmeric-deep); }
  a:focus-visible { outline: 3px solid var(--turmeric); outline-offset: 2px; }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--paper);
    border: 2.5px solid var(--ink);
    box-shadow: 10px 10px 0 var(--turmeric);
    padding: 40px 32px;
    text-align: center;
  }
  .stamp {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--turmeric-deep);
    border: 2px solid var(--turmeric-deep);
    padding: 4px 12px;
    margin-bottom: 18px;
    transform: rotate(-3deg);
  }
  h1 {
    font-family: 'Archivo', sans-serif;
    font-variation-settings: 'wdth' 115;
    font-weight: 800;
    font-size: clamp(1.8rem, 7vw, 2.3rem);
    letter-spacing: -0.01em;
    margin-bottom: 14px;
    text-wrap: balance;
  }
  p.lede { color: var(--gray); max-width: 34ch; margin: 0 auto 30px; }
  .links { display: flex; flex-direction: column; gap: 10px; }
  .btn {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px; letter-spacing: 0.04em;
    padding: 14px 20px;
    border: 2px solid var(--ink);
    text-decoration: none;
    color: var(--ink);
    background: var(--paper);
    transition: background 0.15s ease, color 0.15s ease;
  }
  .btn.primary { background: var(--ink); color: var(--paper); }
  .btn.primary:hover { background: var(--turmeric-deep); border-color: var(--turmeric-deep); }
  .btn:hover { background: var(--tint); }
</style>
</head>
<body>

<div class="card">
  <span class="stamp">Delivered</span>
  <h1>Message Sent</h1>
  <p class="lede">Thanks for reaching out — I typically reply within a day.</p>
  <div class="links">
    <a class="btn primary" href="index.html">View Portfolio</a>
    <a class="btn" href="connect.html">Back to Connect</a>
  </div>
</div>

</body>
</html>
